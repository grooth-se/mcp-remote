services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - portal
    restart: unless-stopped

  portal:
    build: .
    environment:
      - SECRET_KEY=${PORTAL_SECRET_KEY}
      - DATABASE_PATH=/data/portal.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - BEHIND_PROXY=true
    volumes:
      - portal_data:/data
    restart: unless-stopped

  # --- Apps ---

  accruedincome:
    build: ../accruedincome
    environment:
      - FLASK_CONFIG=production
      - SECRET_KEY=${ACCRUEDINCOME_SECRET_KEY:-change-me}
      - DATABASE_URL=sqlite:////data/accrued.db
      - APP_CODE=accruedincome
      - PORTAL_URL=http://portal:5000
      - PORTAL_EXTERNAL_URL=/
      - PORTAL_AUTH_ENABLED=true
      - MG5_INTEGRATION_URL=http://mg5integration:5004
    volumes:
      - accruedincome_data:/data
      - accruedincome_uploads:/app/app/static/uploads
      - accruedincome_output:/app/output
    depends_on:
      - portal
    restart: unless-stopped

  durabler2:
    build: ../Durabler2
    environment:
      - FLASK_CONFIG=production
      - SECRET_KEY=${DURABLER2_SECRET_KEY:-change-me}
      - DATABASE_URL=sqlite:////data/durabler.db
      - APP_CODE=durabler2
      - PORTAL_URL=http://portal:5000
      - PORTAL_AUTH_ENABLED=true
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    volumes:
      - durabler2_data:/data
      - durabler2_reports:/app/reports
      - durabler2_uploads:/app/app/static/uploads
      - durabler2_certs:/app/certs
    depends_on:
      - portal
    restart: unless-stopped

  heatsim:
    build: ../heatsim
    environment:
      - FLASK_CONFIG=production
      - SECRET_KEY=${HEATSIM_SECRET_KEY:-change-me}
      - APP_CODE=heatsim
      - PORTAL_URL=http://portal:5000
      - PORTAL_AUTH_ENABLED=true
    volumes:
      - heatsim_data:/app/instance
      - heatsim_uploads:/app/data/uploads
      - heatsim_results:/app/data/results
    depends_on:
      - portal
    restart: unless-stopped

  mg5integration:
    build: ../MG5integration
    environment:
      - FLASK_CONFIG=production
      - SECRET_KEY=${MG5_SECRET_KEY:-change-me}
      - APP_CODE=mg5integration
      - PORTAL_URL=http://portal:5000
      - PORTAL_AUTH_ENABLED=true
    volumes:
      - mg5_data:/app/instance
      - mg5_exports:/app/data/excel_exports
    depends_on:
      - portal
    restart: unless-stopped

  spinventory:
    build: ../SPInventory
    environment:
      - SECRET_KEY=${SPINVENTORY_SECRET_KEY:-change-me}
      - APP_CODE=spinventory
      - PORTAL_URL=http://portal:5000
      - PORTAL_EXTERNAL_URL=/
      - PORTAL_AUTH_ENABLED=true
      - MG5_DATABASE_PATH=/app/mg5_data/monitor_data.db
    volumes:
      - spinventory_data:/app/data
      - mg5_data:/app/mg5_data:ro
    depends_on:
      - portal
      - mg5integration
    restart: unless-stopped

  mpqpgenerator:
    build: ../mpqp-generator
    environment:
      - FLASK_CONFIG=production
      - SECRET_KEY=${MPQP_SECRET_KEY:-change-me}
      - DATABASE_URL=sqlite:////app/data/mpqp.db
      - APP_CODE=mpqpgenerator
      - PORTAL_URL=http://portal:5000
      - PORTAL_EXTERNAL_URL=/
      - PORTAL_AUTH_ENABLED=true
      - OLLAMA_HOST=http://172.18.0.1:11434
      - LLM_MODEL=llama3.1:8b
      - EMBEDDING_MODEL=nomic-embed-text
      - HISTORICAL_PATH=/data/historical_projects
      - GUNICORN_WORKERS=1
      - GUNICORN_TIMEOUT=300
    ports:
      - "5003:5003"
    volumes:
      - mpqp_data:/app/data
      - /mnt/projects:/data/historical_projects:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - portal
    restart: unless-stopped

  trb:
    build: ../trb
    environment:
      - FLASK_CONFIG=production
      - SECRET_KEY=${TRB_SECRET_KEY:-change-me}
      - DATABASE_URL=sqlite:////data/trb.db
      - DURABLER2_DATABASE_URL=sqlite:////durabler2_data/durabler.db
      - DURABLER2_REPORTS_FOLDER=/app/durabler2_reports
      - APP_CODE=trb
      - PORTAL_URL=http://portal:5000
      - PORTAL_EXTERNAL_URL=/
      - PORTAL_AUTH_ENABLED=true
    volumes:
      - trb_data:/data
      - trb_output:/app/trb_output
      - durabler2_data:/durabler2_data:ro
      - durabler2_reports:/app/durabler2_reports:ro
    depends_on:
      - portal
      - durabler2
    restart: unless-stopped

  # --- Uncomment when ready ---

  # heattreattracker:
  #   build: ../heattreattracker
  #   environment:
  #     - FLASK_CONFIG=production
  #     - PORTAL_URL=http://portal:5000
  #     - PORTAL_AUTH_ENABLED=true
  #   depends_on:
  #     - portal
  #   restart: unless-stopped

volumes:
  portal_data:
  accruedincome_data:
  accruedincome_uploads:
  accruedincome_output:
  durabler2_data:
  durabler2_reports:
  durabler2_uploads:
  durabler2_certs:
  heatsim_data:
  heatsim_uploads:
  heatsim_results:
  mg5_data:
  mg5_exports:
  spinventory_data:
  mpqp_data:
  trb_data:
  trb_output:
